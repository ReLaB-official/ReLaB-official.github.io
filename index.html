<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, viewport-fit=cover">
<title>ReLaB | 個人Vtuberグループ</title>
<meta name="description" content="個人Vtuberグループ、ReLaB。Youtubeをメインに活動中です。魂募集オーディションも開催中です。">
<link rel="icon" href="https://relab.work/wp-content/uploads/2023/04/cropped-logo_ico-32x32.png" sizes="32x32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@600&family=Montserrat&display=swap" rel="stylesheet">

<style>
/* ===== リセット & ベース ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-main: #00c4a2;
  --color-text: #333;
  --color-link: #00866b;
  --color-header-bg: #fff;
  --color-footer-bg: #222;
  --color-footer-text: #aaa;
  --container: 1200px;
  --article: 900px;
}

html { scroll-behavior: smooth; }

body {
  font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  font-size: 16px;
  color: var(--color-text);
  background: #000;
  line-height: 1.8;
}

a { color: var(--color-link); text-decoration: none; transition: 0.4s; }
a:hover { opacity: 0.75; }
img { max-width: 100%; height: auto; display: block; }
ul { list-style: none; }
h2 { font-family: 'Montserrat', sans-serif; }

/* ===== ヘッダー ===== */
#header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 100;
  transition: background 0.4s, box-shadow 0.4s;
  color: #fff;
}
#header.scrolled {
  background: var(--color-header-bg);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  color: var(--color-text);
}

.header-inner {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo img { height: 40px; width: auto; }
.logo .logo-white { display: block; }
.logo .logo-color { display: none; }
#header.scrolled .logo .logo-white { display: none; }
#header.scrolled .logo .logo-color { display: block; }

nav ul {
  display: flex;
  gap: 32px;
}
nav a {
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  letter-spacing: 0.05em;
  color: inherit;
  position: relative;
  padding-bottom: 4px;
}
nav a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 3px;
  border-radius: 2px;
  background: var(--color-main);
  transform: scaleX(0);
  transition: transform 0.3s;
}
nav a:hover::after { transform: scaleX(1); }

/* スマホメニュー */
.menu-btn {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.menu-btn span {
  display: block;
  width: 24px;
  height: 2px;
  background: currentColor;
  transition: 0.3s;
}

#sp-menu {
  display: none;
  position: fixed;
  top: 0;
  right: 0;
  width: 280px;
  height: 100vh;
  background: #fff;
  z-index: 200;
  padding: 64px 32px 32px;
  box-shadow: -4px 0 16px rgba(0,0,0,0.2);
  transform: translateX(100%);
  transition: transform 0.4s;
}
#sp-menu.open { transform: translateX(0); display: block; }
#sp-menu ul { flex-direction: column; gap: 0; }
#sp-menu li { border-bottom: 1px solid #eee; }
#sp-menu a {
  display: block;
  padding: 16px 0;
  color: var(--color-text);
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
}
.sp-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 150;
}
.sp-overlay.open { display: block; }
.sp-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--color-text);
}

/* ===== メインビジュアル ===== */
#main-visual {
  position: relative;
  height: 100vh;
  min-height: 500px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  padding-bottom: 80px;
}
#main-visual video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#main-visual::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.1);
  z-index: 1;
}
.mv-text {
  position: relative;
  z-index: 2;
  max-width: var(--container);
  width: 100%;
  margin: 0 auto;
  padding: 0 40px;
  color: #fff;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
}
.mv-text h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: 3rem;
  line-height: 0.8;
  font-weight: 600;
}

/* ===== セクション共通 ===== */
section { position: relative; }

.section-inner {
  max-width: var(--article);
  margin: 0 auto;
  padding: 60px 24px;
}

.section-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 30px;
  text-align: center;
  position: relative;
  padding-bottom: 16px;
  margin-bottom: 40px;
}
.section-title::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 2px;
  border-radius: 3px;
  background: linear-gradient(to left, #2af598, #009efd);
}

/* ===== NEWS ===== */
#news { background: #fff; }
.news-list li {
  padding: 8px 0;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #eee;
  flex-direction: row-reverse;
  justify-content: flex-end;
}
.news-list a { color: var(--color-text); font-size: 15px; }
.news-list a:hover { color: var(--color-main); }
.news-date {
  font-family: 'Azeret Mono', monospace;
  font-size: 1em;
  color: #666;
  margin-right: 20px;
  white-space: nowrap;
}
.btn-wrap { text-align: center; margin-top: 16px; }

/* ===== ABOUT ===== */
#about {
  /* ← WP版から完全移植した10層グラデーション（これでライブ版と同一になります） */
  background-image: 
    linear-gradient(246deg, rgba(234,234,234,0.04) 0%, rgba(234,234,234,0.04) 33.3%, rgba(69,69,69,0.04) 33.3%, rgba(69,69,69,0.04) 66.6%, rgba(189,189,189,0.04) 66.6%, rgba(189,189,189,0.04) 99.9%),
    linear-gradient(81deg, rgba(126,126,126,0.05) 0%, rgba(126,126,126,0.05) 33.3%, rgba(237,237,237,0.05) 33.3%, rgba(237,237,237,0.05) 66.6%, rgba(74,74,74,0.05) 66.6%, rgba(74,74,74,0.05) 99.9%),
    linear-gradient(14deg, rgba(3,3,3,0.08) 0%, rgba(3,3,3,0.08) 33.3%, rgba(156,156,156,0.08) 33.3%, rgba(156,156,156,0.08) 66.6%, rgba(199,199,199,0.08) 66.6%, rgba(199,199,199,0.08) 99.9%),
    linear-gradient(323deg, rgba(82,82,82,0.06) 0%, rgba(82,82,82,0.06) 33.3%, rgba(179,179,179,0.06) 33.3%, rgba(179,179,179,0.06) 66.6%, rgba(212,212,212,0.06) 66.6%, rgba(212,212,212,0.06) 99.9%),
    linear-gradient(32deg, rgba(70,70,70,0.02) 0%, rgba(70,70,70,0.02) 33.3%, rgba(166,166,166,0.02) 33.3%, rgba(166,166,166,0.02) 66.6%, rgba(53,53,53,0.02) 66.6%, rgba(53,53,53,0.02) 99.9%),
    linear-gradient(38deg, rgba(129,129,129,0.09) 0%, rgba(129,129,129,0.09) 33.3%, rgba(38,38,38,0.09) 33.3%, rgba(38,38,38,0.09) 66.6%, rgba(153,153,153,0.09) 66.6%, rgba(153,153,153,0.09) 99.9%),
    linear-gradient(63deg, rgba(51,51,51,0.02) 0%, rgba(51,51,51,0.02) 33.3%, rgba(12,12,12,0.02) 33.3%, rgba(12,12,12,0.02) 66.6%, rgba(158,158,158,0.02) 66.6%, rgba(158,158,158,0.02) 99.9%),
    linear-gradient(227deg, rgba(63,63,63,0.03) 0%, rgba(63,63,63,0.03) 33.3%, rgba(9,9,9,0.03) 33.3%, rgba(9,9,9,0.03) 66.6%, rgba(85,85,85,0.03) 66.6%, rgba(85,85,85,0.03) 99.9%),
    linear-gradient(103deg, rgba(247,247,247,0.07) 0%, rgba(247,247,247,0.07) 33.3%, rgba(93,93,93,0.07) 33.3%, rgba(93,93,93,0.07) 66.6%, rgba(208,208,208,0.07) 66.6%, rgba(208,208,208,0.07) 99%),
    linear-gradient(0deg, #0b91d7, #6efc29);
  color: #fff;
  text-shadow: 0 0 6px rgba(0,0,0,0.5);
}
#about .section-inner { text-align: center; }
#about p { line-height: 3; }

/* ===== MEMBER ===== */
#member { background: #fff; padding: 0; }
#Type {
  background-color: #000;
  display: flex;
  height: 600px;
  width: 100%;
  margin: 0;
  padding: 0;
}
#Type li {
  width: 12.5%;
  height: 100%;
  overflow: hidden;
  background-repeat: no-repeat;
  background-size: cover;
  background-position-x: 35%;
  opacity: 0.9;
  transition: opacity 0.3s;
}
#Type li:nth-child(1) { background-image: url("Type_01.webp"); }
#Type li:nth-child(2) { background-image: url("Type_02.webp"); }
#Type li:nth-child(3) { background-image: url("Type_03.webp"); }
#Type li:nth-child(4) { background-image: url("Type_04.webp"); }
#Type li:nth-child(5) { background-image: url("Type_05.webp"); }
#Type li:nth-child(6) { background-image: url("Type_06.webp"); }
#Type li:nth-child(7) { background-image: url("Type_07.webp"); }
#Type li:nth-child(8) { background-image: url("Type_08.webp"); }
#Type li:hover { opacity: 1; }
#Type li a { display: block; width: 100%; height: 100%; }

/* ===== AUDITION ===== */
#audition {
  background-image: url("core_gb.webp");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
#audition .section-inner { text-align: center; }

.apply-btn {
  display: inline-block;
  margin: 12px 8px;
  padding: 12px 32px;
  border-radius: 40px;
  background: linear-gradient(100deg, #2af598 0%, #009efd 100%);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
  font-weight: 600;
  transition: 0.3s;
  text-shadow: none;
}
.apply-btn:hover { opacity: 0.85; }

/* ===== フッター ===== */
#footer {
  background: var(--color-footer-bg);
  color: var(--color-footer-text);
}
.footer-inner {
  max-width: var(--container);
  margin: 0 auto;
  padding: 40px 24px 20px;
  text-align: center;
}
.footer-logo { margin-bottom: 24px; display: flex; justify-content: center; }
.footer-logo img { height: 27px; width: auto; }
.footer-nav {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 20px;
}
.footer-nav a { color: var(--color-footer-text); font-size: 13px; }
.footer-nav a:hover { color: #fff; }
.copyright { font-size: 12px; }

/* ===== TOPボタン ===== */
#pag
